<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: light dark; }
    body { font: 13px/1.45 -apple-system, system-ui, sans-serif; margin: 0; padding: 14px; width: 320px; box-sizing: border-box; }
    h1 { font-size: 14px; margin: 0 0 2px; }
    .domain { font-weight: 600; word-break: break-all; }
    .muted { color: #888; font-size: 12px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 12px 0; }
    .toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider { position: absolute; inset: 0; background: #ccc; border-radius: 22px; transition: .2s; }
    .toggle .slider:before { content: ""; position: absolute; width: 18px; height: 18px; left: 2px; top: 2px; background: #fff; border-radius: 50%; transition: .2s; }
    .toggle input:checked + .slider { background: #1a73e8; }
    .toggle input:checked + .slider:before { transform: translateX(18px); }
    select, button { font: inherit; padding: 5px 8px; border: 1px solid #ccc; border-radius: 4px; background: inherit; color: inherit; }
    button { cursor: pointer; border: 0; background: #1a73e8; color: #fff; padding: 7px 12px; border-radius: 4px; }
    button.ghost { background: transparent; color: #1a73e8; border: 0; padding: 2px 4px; }
    .profile { background: #f5f5f5; border-radius: 6px; padding: 8px 10px; font-size: 12px; }
    @media (prefers-color-scheme: dark) { .profile { background: #2a2a2a; } }
    .profile div { display: flex; justify-content: space-between; gap: 8px; }
    .profile b { font-weight: 600; }
    .links { margin-top: 10px; display: flex; justify-content: space-between; }
  </style>
</head>
<body>
  <h1>Two Rabbits</h1>
  <div class="domain" id="domain">—</div>
  <div class="muted" id="status">checking…</div>

  <div class="row">
    <span>Spoof this site</span>
    <label class="toggle"><input type="checkbox" id="toggle" /><span class="slider"></span></label>
  </div>

  <div class="row">
    <span>Preset</span>
    <select id="preset"></select>
  </div>

  <div class="profile" id="profile"></div>

  <div class="links">
    <a href="#" class="ghost" id="options">Options</a>
    <a href="#" class="ghost" id="test">Self-test</a>
    <a href="#" class="ghost" id="reload">Reload tab</a>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
